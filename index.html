<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.csgit add .s">


    <!-- fontawesome cdn -->

<body>



    <div class="container">

        <!-- ========= left container ========== -->
        <div class="left">

            <div class="logo">
                <img src="/assets/Untitled design.png" alt="">
            </div>

            <div class="content">
                <h3>Pokemon Gen I</h3>
                <h1>Pikachu</h1>
                <p>Pikachu is an electric-type Pokémon introduced in the first generation. Pikachu are small, chubby,and
                    incredibly cute mouse-type Pokémon. They are almost completely covered by yellow fur. </p>


                <div class="linedate">
                    <div class="line"></div>
                    <p>01 / 08</p>
                </div>

                <div class="pokeball">
                    <img src="/img/pngwing.com.png" alt="">

            </div>
        </div>

        <div class="pikachu">
            <img src="img/pngegg.png" alt="">
        </div>

        <!-- end -->

        <div class="right">

            <div id="hamburger">
                <i class="fa-solid fa-bars"></i>
            </div>

            <div class="dots">
                <i class="dot1 fa-regular fa-circle-dot"></i>
                <i class="dot2 fa-regular fa-circle-dot"></i>
                <i class="dot3 fa-regular fa-circle-dot"></i>
